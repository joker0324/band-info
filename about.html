        <h1>はじめに</h1>

        <p>
            このサイトは、管理人の私がバンドを始め、バンドにめり込んでいった頃、<br>
            「こんなサイトがあればいいのに」と思っていた物を形にしたサイトです。<br>
            その為、有名どころを網羅した図鑑ではなく、<br>
            かなり趣味嗜好が反映されたものとなっています。ご了承ください。<br>
            しかしその反面、日本語の資料があまり存在していないマイナーなバンドも揃えています。<br>
            情報に餓えた当時の私のようなロックキッズに届けば幸いです。
        </p>
